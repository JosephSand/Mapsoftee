
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Softee - Berlin NJ Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cargando Google Maps con parámetros para optimizar rendimiento y costos -->
    <script src="https://maps.googleapis.com/maps/api/js?v=3.exp&libraries=geometry"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mr-softee-berlin-nj';

        let map;
        let truckMarker;
        let userRole = null;
        let currentUser = null;
        let watchId = null;

        // Berlin, NJ - Centro de operación
        const BERLIN_NJ = { lat: 39.7912, lng: -74.9291 };

        window.togglePasswordInput = (role) => {
            if (role === 'driver') {
                document.getElementById('password-container').classList.toggle('hidden');
            } else {
                window.initApp('client');
            }
        };

        window.initApp = async (role) => {
            if (role === 'driver') {
                const pass = document.getElementById('driver-password').value;
                if (pass !== 'Tauro1996') {
                    showToast("Contraseña incorrecta");
                    return;
                }
            }

            userRole = role;
            document.getElementById('role-selection').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            // Inicio de sesión automático requerido para Firestore
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Error de autenticación", err);
            }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    setupApp();
                }
            });
        };

        function setupApp() {
            initMap();
            if (userRole === 'client') {
                document.getElementById('client-controls').classList.remove('hidden');
                listenToTruckLocation();
            } else {
                document.getElementById('driver-controls').classList.remove('hidden');
                listenToOrders();
            }
        }

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 14,
                center: BERLIN_NJ,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: false,
                zoomControl: true
            });

            truckMarker = new google.maps.Marker({
                position: BERLIN_NJ,
                map: map,
                title: "Mr. Softee Truck",
                icon: {
                    url: "https://cdn-icons-png.flaticon.com/512/938/938063.png",
                    scaledSize: new google.maps.Size(45, 45)
                }
            });
        }

        // FUNCIÓN CRÍTICA: Activa el GPS con reintento y manejo de errores
        window.startTruckTracking = () => {
            if (!navigator.geolocation) {
                showToast("Tu teléfono no soporta GPS");
                return;
            }

            document.getElementById('tracking-status').innerText = "Solicitando permiso de ubicación...";
            
            // Limpiar rastreo previo si existe
            if (watchId) navigator.geolocation.clearWatch(watchId);

            watchId = navigator.geolocation.watchPosition(
                async (pos) => {
                    const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    truckMarker.setPosition(coords);
                    map.panTo(coords);
                    document.getElementById('tracking-status').innerText = "Transmitiendo en vivo 📡";

                    if (currentUser) {
                        try {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'truck_location', 'current'), {
                                lat: coords.lat,
                                lng: coords.lng,
                                updatedAt: new Date().getTime()
                            });
                        } catch (e) { console.error("Error al guardar en nube:", e); }
                    }
                },
                (err) => {
                    let msg = "Error de GPS";
                    if (err.code === 1) msg = "Permiso denegado. Activa la ubicación en ajustes.";
                    if (err.code === 2) msg = "Posición no disponible. Revisa tu señal.";
                    if (err.code === 3) msg = "Tiempo de espera agotado.";
                    showToast(msg);
                    document.getElementById('tracking-status').innerText = "Error: " + msg;
                },
                { 
                    enableHighAccuracy: true, // Usa GPS real, no solo WiFi
                    timeout: 10000, 
                    maximumAge: 0 
                }
            );
        };

        function listenToOrders() {
            const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
            onSnapshot(ordersRef, (snapshot) => {
                const list = document.getElementById('orders-list');
                list.innerHTML = '';
                if (snapshot.empty) {
                    list.innerHTML = '<p class="text-center text-gray-500 py-4 italic">No hay pedidos pendientes en Berlin.</p>';
                    return;
                }
                snapshot.forEach((doc) => {
                    const order = doc.data();
                    const item = document.createElement('div');
                    item.className = "bg-white p-4 rounded-2xl shadow-sm border border-blue-100 flex justify-between items-center mb-3 animate-fade-in";
                    item.innerHTML = `
                        <div>
                            <p class="font-bold text-blue-900">Cliente esperando</p>
                            <p class="text-[10px] text-gray-400 font-mono">${new Date(order.timestamp).toLocaleTimeString()}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.goToLocation(${order.lat}, ${order.lng})" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-md">IR</button>
                            <button onclick="window.markAsVisited('${doc.id}')" class="bg-green-500 text-white px-4 py-2 rounded-xl text-sm shadow-md">✓</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            }, (err) => showToast("Error al conectar con pedidos"));
        }

        window.goToLocation = (lat, lng) => {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`, '_blank');
        };

        window.markAsVisited = async (orderId) => {
            if (!currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', orderId));
                showToast("Ubicación completada");
            } catch (e) { showToast("Error al borrar"); }
        };

        function listenToTruckLocation() {
            const truckRef = doc(db, 'artifacts', appId, 'public', 'data', 'truck_location', 'current');
            onSnapshot(truckRef, (doc) => {
                if (doc.exists()) {
                    const data = doc.data();
                    const pos = { lat: data.lat, lng: data.lng };
                    truckMarker.setPosition(pos);
                    map.panTo(pos);
                    document.getElementById('status-text').innerText = "¡Mr. Softee está cerca!";
                    document.getElementById('status-text').classList.replace('text-gray-400', 'text-green-600');
                }
            });
        }

        window.requestIceCream = () => {
            if (navigator.geolocation) {
                showToast("Obteniendo tu ubicación...");
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    if (!currentUser) return;
                    try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            timestamp: new Date().getTime()
                        });
                        showToast("🍦 ¡Pedido enviado! Mira el mapa.");
                    } catch (e) { showToast("Error al enviar pedido"); }
                }, (err) => showToast("Debes permitir el GPS para pedir"));
            }
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = "1";
            t.style.bottom = "40px";
            setTimeout(() => {
                t.style.opacity = "0";
                t.style.bottom = "20px";
            }, 3500);
        }
    </script>
    <style>
        :root { --softee-blue: #0056b3; --softee-cream: #fffaf4; }
        body { background-color: var(--softee-cream); font-family: system-ui, -apple-system, sans-serif; }
        #map { height: 45vh; width: 100%; border-radius: 2rem; }
        .hidden { display: none !important; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:max-w-xl md:mx-auto">

    <!-- Selección inicial -->
    <div id="role-selection" class="flex flex-col items-center justify-center min-h-[90vh] space-y-8">
        <div class="text-center">
            <h1 class="text-6xl font-black text-blue-800 tracking-tighter italic">Mr. Softee</h1>
            <p class="text-blue-500 font-bold uppercase text-xs tracking-widest mt-1">Berlin, NJ Truck</p>
        </div>
        
        <div class="w-full space-y-4 px-6">
            <button onclick="window.initApp('client')" class="w-full bg-white border-4 border-blue-600 text-blue-700 font-black py-6 rounded-3xl shadow-xl active:scale-95 transition-all text-xl">
                🍦 BUSCAR CAMIÓN
            </button>
            
            <button onclick="togglePasswordInput('driver')" class="w-full bg-blue-600 text-white font-black py-6 rounded-3xl shadow-xl active:scale-95 transition-all text-xl">
                🚛 SOY MR. SOFTEE
            </button>

            <div id="password-container" class="hidden animate-fade-in bg-white p-6 rounded-3xl shadow-2xl border border-blue-100">
                <input type="password" id="driver-password" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl mb-4 focus:ring-4 ring-blue-100 outline-none" placeholder="Contraseña">
                <button onclick="initApp('driver')" class="w-full bg-blue-800 text-white font-black py-4 rounded-2xl">INGRESAR</button>
            </div>
        </div>
    </div>

    <!-- Interfaz de la Aplicación -->
    <div id="main-app" class="hidden">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black text-blue-900">Mr. Softee <span class="text-blue-500 text-sm">NJ</span></h1>
            <button onclick="location.reload()" class="text-[10px] font-bold bg-white border border-gray-200 px-3 py-1 rounded-full shadow-sm">SALIR</button>
        </header>

        <div id="map" class="mb-6 shadow-xl border-4 border-white"></div>

        <!-- Controles para el Cliente -->
        <div id="client-controls" class="hidden">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border-t-8 border-blue-600 text-center">
                <p id="status-text" class="text-xs text-gray-400 font-bold mb-4 uppercase tracking-widest">Localizando...</p>
                <button onclick="requestIceCream()" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl shadow-lg active:scale-95 transition-all text-lg">
                    📍 ¡QUIERO HELADO AQUÍ!
                </button>
            </div>
        </div>

        <!-- Controles para Mr. Softee -->
        <div id="driver-controls" class="hidden space-y-6">
            <div class="bg-blue-900 p-6 rounded-3xl shadow-2xl">
                <button onclick="startTruckTracking()" class="w-full bg-green-400 text-blue-950 font-black py-4 rounded-2xl shadow-lg mb-3 uppercase">
                    📡 TRANSMITIR UBICACIÓN
                </button>
                <p id="tracking-status" class="text-center text-[10px] text-blue-200 font-bold uppercase tracking-widest">GPS listo para iniciar</p>
            </div>

            <div>
                <h2 class="font-black text-blue-950 text-xl px-2 mb-4">CLIENTES ESPERANDO</h2>
                <div id="orders-list" class="space-y-3">
                    <!-- Pedidos dinámicos -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast UI -->
    <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-blue-950 text-white px-8 py-4 rounded-2xl text-sm font-bold opacity-0 transition-all duration-500 shadow-2xl z-50 text-center border-b-4 border-blue-400"></div>

</body>
</html>
